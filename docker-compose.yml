# =============================================================================
# Sentro — Self-Hosted Docker Compose
# =============================================================================
# This file is for SELF-HOSTED deployments (one-click install, single machine).
#
# Usage:
#   cp .env.example .env        # Fill in values
#   docker compose up -d        # Start all services
#   docker compose logs -f      # Follow logs
#
# Optional profiles:
#   docker compose --profile docs up -d        # Add documentation portal
#   docker compose --profile sandbox up -d     # Add mock endpoints + MailHog
#   docker compose --profile monitoring up -d  # Add Prometheus + Grafana
#
# Default stack:
#   caddy       → Reverse proxy (ports 80, 443)
#   postgres    → PostgreSQL 16 database
#   redis       → Redis 7 (BullMQ queue + rate limiting)
#   migrate     → One-off migration job
#   app         → Dashboard (Next.js, port 3001)
#   admin       → Admin panel (Next.js, port 3002)
#   api         → REST API (Fastify, port 4000)
#   worker      → Monitor worker (BullMQ, metrics on 9464)
# =============================================================================

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-sentro}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sentro}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  AUTH_SECRET: ${AUTH_SECRET}
  AUTH_URL: ${AUTH_URL:-http://localhost:3001}
  AUTH_TRUST_HOST: "true"
  NEXTAUTH_URL: ${AUTH_URL:-http://localhost:3001}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
  CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:3001,http://localhost:3002}
  SELF_HOSTED: "true"
  LICENSE_KEY: ${SENTRO_LICENSE_KEY:-}
  LICENSE_CHECK_URL: ${LICENSE_CHECK_URL:-}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-noreply@sentro.local}
  AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
  AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
  AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
  AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
  NEXT_PUBLIC_APP_URL: ${AUTH_URL:-http://localhost:3001}
  STATUS_PAGE_CUSTOM_DOMAINS: ${STATUS_PAGE_CUSTOM_DOMAINS:-}

services:
  # ==========================================================================
  # Reverse Proxy
  # ==========================================================================
  caddy:
    <<: *common
    image: caddy:2-alpine
    container_name: sentro-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN_APP: ${DOMAIN_APP:-app.localhost}
      DOMAIN_ADMIN: ${DOMAIN_ADMIN:-admin.localhost}
      DOMAIN_API: ${DOMAIN_API:-api.localhost}
      DOMAIN_DOCS: ${DOMAIN_DOCS:-docs.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
      admin:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: sentro-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sentro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: sentro-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ==========================================================================
  # Database Migrations (runs once on startup)
  # ==========================================================================
  migrate:
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-app:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-migrate
    # NOTE: Switch to "prisma migrate deploy" once migration files are generated.
    # Currently uses "db push" because no migrations/ directory exists yet.
    command: >
      sh -c "cd /migrate && node node_modules/prisma/build/index.js db push
      --schema=schema.prisma &&
      node seed.js || echo 'Database setup completed (seed may have already run)'"
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  # ==========================================================================
  # Application Services
  # ==========================================================================
  app:
    <<: *common
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-app:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-app
    environment:
      <<: *app-env
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  admin:
    <<: *common
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-admin:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-admin
    environment:
      <<: *app-env
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  api:
    <<: *common
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-api:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-api
    environment:
      <<: *app-env
      PORT: "4000"
      HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  worker:
    <<: *common
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-worker:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-worker
    ports:
      - "127.0.0.1:${PROMETHEUS_METRICS_PORT:-9464}:9464"
    environment:
      <<: *app-env
      PROMETHEUS_METRICS_PORT: "9464"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ==========================================================================
  # Documentation (optional — enable with: docker compose --profile docs up -d)
  # ==========================================================================
  docs:
    <<: *common
    image: ${SENTRO_IMAGE_REGISTRY:-ghcr.io/sentro-dev/platform}/sentro-docs:${SENTRO_IMAGE_TAG:-latest}
    container_name: sentro-docs
    environment:
      PORT: "3003"
    profiles:
      - docs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ==========================================================================
  # Sandbox (optional — mock endpoints + email capture)
  # ==========================================================================
  mockserver:
    <<: *common
    image: node:22-alpine
    container_name: sentro-mockserver
    ports:
      - "127.0.0.1:1080:1080"
    volumes:
      - ./server.mjs:/app/server.mjs:ro
    working_dir: /app
    command: node server.mjs
    profiles:
      - sandbox
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  mailhog:
    <<: *common
    image: mailhog/mailhog:latest
    container_name: sentro-mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    profiles:
      - sandbox
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ==========================================================================
  # Observability (optional — enable with: docker compose --profile monitoring up -d)
  # ==========================================================================
  prometheus:
    <<: *common
    image: prom/prometheus:v2.53.0
    container_name: sentro-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  grafana:
    <<: *common
    image: grafana/grafana:11.4.0
    container_name: sentro-grafana
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-sentro}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
